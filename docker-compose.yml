services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./python-backend
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      ADMIN_EXPORT_TOKEN: ${ADMIN_EXPORT_TOKEN:?Set ADMIN_EXPORT_TOKEN in .env.production}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
    volumes:
      - ./python-backend/data:/app/data
    restart: unless-stopped
